<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdMarket | Authentication</title>

<meta 
name="description"
content="Login or create your AdMarket account.">


<!-- CSS -->

<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/utilities.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/app.css">


</head>


<body>


<div id="loader" class="loader">

<div class="spinner"></div>

</div>



<main class="auth-page">


<div class="auth-container">


<!-- LOGO -->

<a href="index.html" class="auth-logo">

<img
src="assets/images/logo.png"
alt="AdMarket Logo"
width="60"
height="60">

<h1>AdMarket</h1>

</a>



<p class="auth-subtitle">

Buy • Sell • Discover • Grow

</p>




<section class="auth-card">



<!-- SWITCH BUTTONS -->

<div class="auth-switch">


<button

id="login-tab"

class="auth-tab active"

type="button">

Login

</button>



<button

id="register-tab"

class="auth-tab"

type="button">

Register

</button>



<span class="auth-switch-indicator"></span>


</div>





<!-- LOGIN FORM -->


<form

id="login-form"

class="auth-form">


<div class="form-group">


<label class="form-label">

Email Address

</label>



<input

id="login-email"

class="form-control"

type="email"

required>


</div>





<div class="form-group">


<label class="form-label">

Password

</label>



<input

id="login-password"

class="form-control"

type="password"

required>


</div>





<button

type="submit"

class="btn btn-primary btn-block">


Login


</button>



</form>






<!-- REGISTER FORM -->


<form

id="register-form"

class="auth-form"

hidden>



<div class="form-group">


<label class="form-label">

Full Name

</label>



<input

id="register-name"

class="form-control"

type="text"

required>


</div>



<div class="form-group">


<label class="form-label">

Email Address

</label>



<input

id="register-email"

class="form-control"

type="email"

required>


</div>




<div class="form-group">


<label class="form-label">

Phone Number

</label>



<input

id="register-phone"

class="form-control"

type="tel"

placeholder="+254..."

required>


</div>



<div class="form-group">


<label class="form-label">

Password

</label>


<input

id="register-password"

class="form-control"

type="password"

required>


</div>




<div class="form-group">


<label class="form-label">

Confirm Password

</label>



<input

id="register-confirm-password"

class="form-control"

type="password"

required>


</div>





<!-- ACCOUNT TYPE -->


<div class="form-group">


<label class="form-label">

Account Type

</label>




<div class="account-types">



<label class="account-option">


<input

type="radio"

name="accountType"

value="buyer"

checked>


<span>

<strong>Buyer</strong>

<small>

Shop and place orders.

</small>

</span>


</label>




<label class="account-option">


<input

type="radio"

name="accountType"

value="business">


<span>


<strong>Business</strong>


<small>

Sell products and manage a store.

</small>


</span>


</label>


</div>


</div>





<button

type="submit"

class="btn btn-primary btn-block">


Create Account


</button>



</form>





<!-- DIVIDER -->


<div class="auth-divider">

<span>

or continue with

</span>

</div>






<!-- SOCIAL LOGIN -->


<div class="social-login">


<button

id="google-signin"

type="button"

class="btn btn-outline btn-block">


Continue with Google


</button>



<button

type="button"

class="btn btn-outline btn-block"

disabled>


Apple (Coming Soon)


</button>




<button

type="button"

class="btn btn-outline btn-block"

disabled>


Microsoft (Coming Soon)


</button>




<button

type="button"

class="btn btn-outline btn-block"

disabled>


GitHub (Coming Soon)


</button>



</div>






<div class="auth-footer">


<small>


By continuing, you agree to our

<a href="#">

Terms of Service

</a>


and


<a href="#">

Privacy Policy

</a>


</small>


</div>



</section>



</div>



</main>







<!-- JAVASCRIPT -->


<script src="assets/js/core/api.js"></script>

<script src="assets/js/core/loader.js"></script>

<script src="assets/js/core/toast.js"></script>

<script src="assets/js/core/validator.js"></script>


<script src="assets/js/auth.js"></script>



</body>


</html>
