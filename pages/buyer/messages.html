<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Messages | AdMarket

    </title>

    <meta
        name="description"
        content="Chat with sellers on AdMarket.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <!-- Loader -->

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <!-- Header -->

    <header class="dashboard-header">

        <div class="container">

            <a
                href="../../index.html"
                class="navbar-brand">

                <img
                    src="../../assets/images/logo.png"
                    alt="AdMarket Logo">

                <span>

                    AdMarket

                </span>

            </a>

            <div class="dashboard-actions">

                <a
                    href="dashboard.html"
                    class="btn btn-outline">

                    Dashboard

                </a>

            </div>

        </div>

    </header>

    <main class="dashboard">

        <div class="container">

            <section class="section-header">

                <h1>

                    Messages

                </h1>

                <p>

                    Communicate directly with sellers about products and orders.

                </p>

            </section>

            <section class="messages-layout">

                <!-- Conversations -->

                <aside class="conversation-list">

                    <input
                        type="search"
                        class="form-control"
                        placeholder="Search conversations...">

                    <div id="conversation-list">

                        <div class="conversation-item active">

                            <strong>

                                Demo Store

                            </strong>

                            <p>

                                Start a conversation...

                            </p>

                        </div>

                    </div>

                </aside>

                <!-- Chat Window -->

                <section class="chat-window">

                    <div
                        class="chat-header">

                        <h2>

                            Demo Store

                        </h2>

                    </div>

                    <div
                        id="chat-messages"
                        class="chat-messages">

                        <div class="message received">

                            Welcome to AdMarket messaging.

                        </div>

                    </div>

                    <form
                        id="chat-form"
                        class="chat-input">

                        <input
                            type="text"
                            class="form-control"
                            placeholder="Type your message...">

                        <button
                            class="btn btn-primary"
                            type="submit">

                            Send

                        </button>

                    </form>

                </section>

            </section>

        </div>

    </main>

    <!-- Footer -->

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>
</body>

</html>
