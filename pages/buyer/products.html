<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Browse Products | AdMarket

    </title>

    <meta
        name="description"
        content="Browse products on AdMarket.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <!-- Loader -->

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <!-- Header -->

    <header class="dashboard-header">

        <div class="container">

            <a
                href="../../index.html"
                class="navbar-brand">

                <img
                    src="../../assets/images/logo.png"
                    alt="AdMarket Logo">

                <span>

                    AdMarket

                </span>

            </a>

            <div class="dashboard-actions">

                <a
                    href="dashboard.html"
                    class="btn btn-outline">

                    Dashboard

                </a>

                <button
                    class="btn btn-primary">

                    Profile

                </button>

            </div>

        </div>

    </header>

    <main class="dashboard">

        <div class="container">

            <section class="section-header">

                <h1>

                    Browse Products

                </h1>

                <p>

                    Discover products from trusted sellers across different categories.

                </p>

            </section>

            <!-- Search -->

            <section class="dashboard-search">

                <input
                    id="product-search"
                    class="form-control"
                    type="search"
                    placeholder="Search products...">

            </section>

            <!-- Filters -->

            <section class="product-filters">

                <select
                    id="category-filter"
                    class="form-control">

                    <option value="">

                        All Categories

                    </option>

                </select>

                <select
                    id="price-filter"
                    class="form-control">

                    <option value="">

                        Any Price

                    </option>

                </select>

                <select
                    id="sort-filter"
                    class="form-control">

                    <option value="latest">

                        Latest

                    </option>

                    <option value="price-low">

                        Price: Low to High

                    </option>

                    <option value="price-high">

                        Price: High to Low

                    </option>

                    <option value="rating">

                        Highest Rated

                    </option>

                </select>

            </section>

            <!-- Products -->

            <section>

                <div
                    id="products-grid"
                    class="products-grid">

                </div>

            </section>

                        <!-- Empty State -->

            <section
                id="empty-products"
                class="empty-state"
                hidden>

                <h2>

                    No Products Found

                </h2>

                <p>

                    Try changing your search or filter options.

                </p>

            </section>

            <!-- Pagination -->

            <section class="pagination">

                <button
                    class="btn btn-outline"
                    id="previous-page">

                    Previous

                </button>

                <span
                    class="pagination-info">

                    Page 1 of 1

                </span>

                <button
                    class="btn btn-outline"
                    id="next-page">

                    Next

                </button>

            </section>

        </div>

    </main>

    <!-- Footer -->

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>
</body>

</html>
