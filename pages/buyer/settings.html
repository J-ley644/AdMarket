<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Settings | AdMarket

    </title>

    <meta
        name="description"
        content="Manage your AdMarket account settings.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <!-- Loader -->

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <!-- Header -->

    <header class="dashboard-header">

        <div class="container">

            <a
                href="../../index.html"
                class="navbar-brand">

                <img
                    src="../../assets/images/logo.png"
                    alt="AdMarket Logo">

                <span>

                    AdMarket

                </span>

            </a>

            <div class="dashboard-actions">

                <a
                    href="dashboard.html"
                    class="btn btn-outline">

                    Dashboard

                </a>

            </div>

        </div>

    </header>

    <main class="dashboard">

        <div class="container">

            <section class="section-header">

                <h1>

                    Account Settings

                </h1>

                <p>

                    Manage your profile, security and notification preferences.

                </p>

            </section>

            <!-- Profile -->

            <section class="section">

                <div class="section-header">

                    <h2>

                        Profile

                    </h2>

                </div>

                <form class="settings-form">

                    <div class="form-group">

                        <label for="full-name">

                            Full Name

                        </label>

                        <input
                            id="full-name"
                            class="form-control"
                            type="text"
                            placeholder="Your full name">

                    </div>

                    <div class="form-group">

                        <label for="email">

                            Email

                        </label>

                        <input
                            id="email"
                            class="form-control"
                            type="email"
                            placeholder="you@example.com">

                    </div>

                    <div class="form-group">

                        <label for="phone">

                            Phone Number

                        </label>

                        <input
                            id="phone"
                            class="form-control"
                            type="tel"
                            placeholder="07XXXXXXXX">

                    </div>

                </form>

            </section>

            <!-- Preferences -->

            <section class="section">

                <div class="section-header">

                    <h2>

                        Preferences

                    </h2>

                </div>

                <label class="checkbox">

                    <input type="checkbox">

                    <span>

                        Email Notifications

                    </span>

                </label>

                <label class="checkbox">

                    <input type="checkbox">

                    <span>

                        SMS Notifications

                    </span>

                </label>

            </section>

            <!-- Security -->

            <section class="section">

                <div class="section-header">

                    <h2>

                        Security

                    </h2>

                </div>

                <button
                    class="btn btn-outline">

                    Change Password

                </button>

            </section>

            <!-- Account Actions -->

            <section class="section">

                <div class="section-header">

                    <h2>

                        Account

                    </h2>

                </div>

                <div class="dashboard-actions">

                    <button
                        class="btn btn-primary">

                        Save Changes

                    </button>

                    <button
                        class="btn btn-outline">

                        Log Out

                    </button>

                </div>

            </section>

        </div>

    </main>

    <!-- Footer -->

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>
</body>

</html>
