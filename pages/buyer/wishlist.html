<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Wishlist | AdMarket

    </title>

    <meta
        name="description"
        content="Your saved products on AdMarket.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <!-- Loader -->

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <!-- Header -->

    <header class="dashboard-header">

        <div class="container">

            <a
                href="../../index.html"
                class="navbar-brand">

                <img
                    src="../../assets/images/logo.png"
                    alt="AdMarket Logo">

                <span>

                    AdMarket

                </span>

            </a>

            <div class="dashboard-actions">

                <a
                    href="dashboard.html"
                    class="btn btn-outline">

                    Dashboard

                </a>

                <a
                    href="products.html"
                    class="btn btn-primary">

                    Continue Shopping

                </a>

            </div>

        </div>

    </header>

    <main class="dashboard">

        <div class="container">

            <section class="section-header">

                <h1>

                    My Wishlist

                </h1>

                <p>

                    Save products you're interested in and purchase them later.

                </p>

            </section>

            <!-- Search -->

            <section class="dashboard-search">

                <input
                    id="wishlist-search"
                    class="form-control"
                    type="search"
                    placeholder="Search wishlist...">

            </section>

            <!-- Wishlist Products -->

            <section>

                <div
                    id="wishlist-grid"
                    class="products-grid">

                </div>

            </section>

            <!-- Empty State -->

            <section
                id="wishlist-empty"
                class="empty-state"
                hidden>

                <h2>

                    Your Wishlist is Empty

                </h2>

                <p>

                    Browse products and tap the wishlist button to save your favorites.

                </p>

                <a
                    href="products.html"
                    class="btn btn-primary">

                    Browse Products

                </a>

            </section>

        </div>

    </main>

    <!-- Footer -->

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>
</body>

</html>
