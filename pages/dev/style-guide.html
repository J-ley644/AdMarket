<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        AMUI Style Guide

    </title>

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <main class="container">

        <header class="section-header">

            <h1>

                AdMarket UI (AMUI)

            </h1>

            <p>

                Internal Design System Documentation

            </p>

        </header>

        <!-- Components will go here -->

        <section class="section">

    <div class="section-header">

        <h2>

            Buttons

        </h2>

    </div>

    <button class="am-btn am-btn-primary">

        Primary

    </button>

    <button class="am-btn am-btn-secondary">

        Secondary

    </button>

    <button class="am-btn am-btn-success">

        Success

    </button>

    <button class="am-btn am-btn-warning">

        Warning

    </button>

    <button class="am-btn am-btn-danger">

        Danger

    </button>

    <button class="am-btn am-btn-outline">

        Outline

    </button>

</section>

<section class="section">

    <h2>

        Status Badges

    </h2>

    <span class="am-badge am-badge-success">

        Approved

    </span>

    <span class="am-badge am-badge-warning">

        Pending

    </span>

    <span class="am-badge am-badge-danger">

        Rejected

    </span>

    <span class="am-badge am-badge-info">

        Paid

    </span>

</section>

<section class="section">

    <div class="am-alert am-alert-success">

        Seller Approved Successfully

    </div>

    <div class="am-alert am-alert-warning">

        Awaiting Verification

    </div>

    <div class="am-alert am-alert-danger">

        Payment Failed

    </div>

    <div class="am-alert am-alert-info">

        New Update Available

    </div>

</section>

<div class="am-card">

    <div class="am-card-header">

        Product Card

    </div>

    <div class="am-card-body">

        Card Body

    </div>

    <div class="am-card-footer">

        Footer

    </div>

</div>

<div class="am-form-group">

    <label class="am-label">

        Product Name

    </label>

    <input
        class="am-input"
        type="text">

</div>

<section class="am-section">

    <h2 class="am-h2">Buttons</h2>

    <div class="am-btn-group">

        <button class="am-btn am-btn-primary">
            Primary
        </button>

        <button class="am-btn am-btn-secondary">
            Secondary
        </button>

        <button class="am-btn am-btn-success">
            Success
        </button>

        <button class="am-btn am-btn-warning">
            Warning
        </button>

        <button class="am-btn am-btn-danger">
            Danger
        </button>

        <button class="am-btn am-btn-outline">
            Outline
        </button>

        <button class="am-btn am-btn-ghost">
            Ghost
        </button>

    </div>

</section>



    </main>

</body>

</html>
