<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Automotive | AdMarket</title>

    <link rel="stylesheet" href="../../../assets/css/app.css">

</head>

<body>

    <!-- Navbar -->



    <!-- ==========================
     BREADCRUMB
========================== -->

<section class="category-breadcrumb">

    <div class="am-container">

        <a href="../../../index.html">Home</a>

        <span>/</span>

        <span>Automotive</span>

    </div>

</section>

<!-- ==========================
     CATEGORY HEADER
========================== -->

<section class="category-header">

    <div class="am-container">

        <h1>Automotive</h1>

        <p>
            Vehicle accessories, spare parts and automotive essentials.
        </p>

    </div>

</section>

<!-- ==========================
     SEARCH & FILTERS
========================== -->

<section class="category-search">

    <div class="am-container">

        <div class="search-bar">

            <input
                type="search"
                class="am-input"
                placeholder="Search electronics...">

            <button class="am-btn am-btn-primary">
                Search
            </button>

        </div>

    </div>

</section>

<!-- ==========================
     PRODUCT GRID
========================== -->

<section class="category-products">

    <div class="am-container">

        <div class="products-grid">

            <!-- Product Card -->

            <div class="am-card">

                <img
                    src="../../../assets/images/placeholder-product.jpg"
                    alt="Product">

                <div class="product-content">

                    <h3>Samsung Galaxy S24</h3>

                    <p class="price">
                        KSh 120,000
                    </p>

                    <a
                        href="../product.html"
                        class="am-btn am-btn-primary am-btn-block">

                        View Product

                    </a>

                </div>

            </div>

            <!-- Duplicate this card later -->

        </div>

    </div>

</section>

<!-- ==========================
     PAGINATION
========================== -->

<section class="pagination">

    <div class="am-container">

        <button class="am-btn am-btn-outline">
            Previous
        </button>

        <button class="am-btn am-btn-primary">
            1
        </button>

        <button class="am-btn am-btn-outline">
            2
        </button>

        <button class="am-btn am-btn-outline">
            Next
        </button>

    </div>

</section>



    <!-- Category Header -->



    <!-- Search & Filters -->



    <!-- Product Grid -->



    <!-- Pagination -->



    <!-- Footer -->



    <script src="../../../assets/js/app.js"></script>

</body>

</html>
