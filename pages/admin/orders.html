<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Order Management | AdMarket Admin

    </title>

    <meta
        name="description"
        content="Monitor and manage marketplace orders.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <header class="dashboard-header">

        <div class="container">

            <a
                href="dashboard.html"
                class="navbar-brand">

                <img
                    src="../../assets/images/logo.png"
                    alt="AdMarket Logo">

                <span>

                    AdMarket Admin

                </span>

            </a>

        </div>

    </header>

    <main class="dashboard">

        <div class="container">

            <section class="section-header">

                <h1>

                    Order Management

                </h1>

                <p>

                    Monitor orders, investigate disputes, and oversee marketplace transactions.

                </p>

            </section>

            <!-- Search & Filters -->

            <section class="product-filters">

                <input
                    id="order-search"
                    class="form-control"
                    type="search"
                    placeholder="Search by order ID, buyer or seller">

                <select
                    id="order-status"
                    class="form-control">

                    <option value="">All Statuses</option>
                    <option>Pending</option>
                    <option>Confirmed</option>
                    <option>Processing</option>
                    <option>Shipped</option>
                    <option>Delivered</option>
                    <option>Cancelled</option>
                    <option>Refunded</option>

                </select>

            </section>

            <!-- Orders Table -->

            <section class="dashboard-table">

                <table>

                    <thead>

                        <tr>

                            <th>Order ID</th>
                            <th>Buyer</th>
                            <th>Seller</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody id="admin-orders-table">

                        <tr>

                            <td colspan="7">

                                No orders found.

                            </td>

                        </tr>

                    </tbody>

                </table>

            </section>

            <!-- Admin Actions -->

            <section class="section">

                <div class="dashboard-actions">

                    <button
                        class="btn btn-outline"
                        type="button">

                        Export Orders

                    </button>

                    <button
                        class="btn btn-outline"
                        type="button">

                        Refresh

                    </button>

                </div>

            </section>

        </div>

    </main>

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>
</body>

</html>
