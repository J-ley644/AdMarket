<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        User Management | AdMarket Admin

    </title>

    <meta
        name="description"
        content="Manage users on AdMarket.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <header class="dashboard-header">

        <div class="container">

            <a
                href="dashboard.html"
                class="navbar-brand">

                <img
                    src="../../assets/images/logo.png"
                    alt="AdMarket Logo">

                <span>

                    AdMarket Admin

                </span>

            </a>

        </div>

    </header>

    <main class="dashboard">

        <div class="container">

            <section class="section-header">

                <h1>

                    User Management

                </h1>

                <p>

                    Search, monitor and manage buyer, seller and administrator accounts.

                </p>

            </section>

            <!-- Search & Filters -->

            <section class="product-filters">

                <input
                    id="user-search"
                    class="form-control"
                    type="search"
                    placeholder="Search by name, email or phone">

                <select
                    id="user-role"
                    class="form-control">

                    <option value="">

                        All Roles

                    </option>

                    <option>

                        Buyer

                    </option>

                    <option>

                        Seller

                    </option>

                    <option>

                        Administrator

                    </option>

                </select>

                <select
                    id="user-status"
                    class="form-control">

                    <option value="">

                        All Statuses

                    </option>

                    <option>

                        Active

                    </option>

                    <option>

                        Suspended

                    </option>

                    <option>

                        Pending Verification

                    </option>

                </select>

            </section>

            <!-- Users Table -->

            <section class="dashboard-table">

                <table>

                    <thead>

                        <tr>

                            <th>User ID</th>

                            <th>Name</th>

                            <th>Email</th>

                            <th>Role</th>

                            <th>Status</th>

                            <th>Joined</th>

                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody id="users-table">

                        <tr>

                            <td colspan="7">

                                No users found.

                            </td>

                        </tr>

                    </tbody>

                </table>

            </section>

            <!-- Admin Actions -->

            <section class="section">

                <div class="dashboard-actions">

                    <button
                        class="btn btn-outline"
                        type="button">

                        Export Users

                    </button>

                    <button
                        class="btn btn-outline"
                        type="button">

                        Refresh

                    </button>

                </div>

            </section>

        </div>

    </main>

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>
</body>

</html>
