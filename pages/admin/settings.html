<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Platform Settings | AdMarket Admin

    </title>

    <meta
        name="description"
        content="Configure AdMarket platform settings.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <header class="dashboard-header">

        <div class="container">

            <a
                href="dashboard.html"
                class="navbar-brand">

                <img
                    src="../../assets/images/logo.png"
                    alt="AdMarket Logo">

                <span>

                    AdMarket Admin

                </span>

            </a>

        </div>

    </header>

    <main class="dashboard">

        <div class="container">

            <section class="section-header">

                <h1>

                    Platform Settings

                </h1>

                <p>

                    Manage marketplace configuration and platform preferences.

                </p>

            </section>

            <!-- General Settings -->

            <section class="section">

                <div class="section-header">

                    <h2>

                        General

                    </h2>

                </div>

                <div class="form-group">

                    <label for="platform-name">

                        Platform Name

                    </label>

                    <input
                        id="platform-name"
                        class="form-control"
                        type="text"
                        value="AdMarket">

                </div>

                <div class="form-group">

                    <label for="support-email">

                        Support Email

                    </label>

                    <input
                        id="support-email"
                        class="form-control"
                        type="email"
                        placeholder="support@example.com">

                </div>

            </section>

            <!-- Seller Verification -->

            <section class="section">

                <div class="section-header">

                    <h2>

                        Seller Verification

                    </h2>

                </div>

                <label class="checkbox">

                    <input
                        type="checkbox"
                        checked>

                    <span>

                        Require seller verification before selling.

                    </span>

                </label>

                <label class="checkbox">

                    <input
                        type="checkbox"
                        checked>

                    <span>

                        Allow administrators to request additional verification information.

                    </span>

                </label>

            </section>

            <!-- Marketplace -->

            <section class="section">

                <div class="section-header">

                    <h2>

                        Marketplace

                    </h2>

                </div>

                <label class="checkbox">

                    <input
                        type="checkbox"
                        checked>

                    <span>

                        Enable buyer reviews.

                    </span>

                </label>

                <label class="checkbox">

                    <input
                        type="checkbox"
                        checked>

                    <span>

                        Enable product reporting.

                    </span>

                </label>

                <label class="checkbox">

                    <input
                        type="checkbox"
                        checked>

                    <span>

                        Enable seller messaging.

                    </span>

                </label>

            </section>

            <!-- Security -->

            <section class="section">

                <div class="section-header">

                    <h2>

                        Security

                    </h2>

                </div>

                <label class="checkbox">

                    <input
                        type="checkbox"
                        checked>

                    <span>

                        Enable two-factor authentication for administrators.

                    </span>

                </label>

                <label class="checkbox">

                    <input
                        type="checkbox"
                        checked>

                    <span>

                        Log administrator activity.

                    </span>

                </label>

            </section>

            <!-- Actions -->

            <section class="section">

                <div class="dashboard-actions">

                    <button
                        type="button"
                        class="btn btn-outline">

                        Reset

                    </button>

                    <button
                        type="button"
                        class="btn btn-primary">

                        Save Settings

                    </button>

                </div>

            </section>

        </div>

    </main>

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>
</body>

</html>
