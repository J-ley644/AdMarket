<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Become a Seller | AdMarket

    </title>

    <meta
        name="description"
        content="Start selling on AdMarket.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

<div id="loader" class="loader">

    <div class="spinner"></div>

</div>

<header class="dashboard-header">

    <div class="container">

        <a
            href="../../index.html"
            class="navbar-brand">

            <img
                src="../../assets/images/logo.png"
                alt="AdMarket Logo">

            <span>

                AdMarket

            </span>

        </a>

    </div>

</header>

<main class="dashboard">

<div class="container">

<section class="section-header">

<h1>

Become a Seller

</h1>

<p>

Complete the information below to begin your seller application.

</p>

</section>

<form id="seller-onboarding-form">

<div class="form-group">

<label>

Store Name

</label>

<input
class="form-control"
type="text"
placeholder="Enter your store name">

</div>

<div class="form-group">

<label>

Store Description

</label>

<textarea
class="form-control"
rows="5"
placeholder="Describe your store"></textarea>

</div>

<div class="form-group">

<label>

Business Category

</label>

<select class="form-control">

<option>Electronics</option>

<option>Fashion</option>

<option>Beauty</option>

<option>Home & Living</option>

<option>Sports</option>

<option>Books</option>

<option>Automotive</option>

<option>Health</option>

<option>Other</option>

</select>

</div>

<div class="form-group">

<label>

Country

</label>

<input
class="form-control"
type="text"
placeholder="Country">

</div>

<div class="form-group">

<label>

County / State

</label>

<input
class="form-control"
type="text"
placeholder="County or State">

</div>

<div class="form-group">

<label>

Town / City

</label>

<input
class="form-control"
type="text"
placeholder="Town or City">

</div>

                <div class="form-group">

                    <label for="business-address">

                        Business Address

                    </label>

                    <textarea
                        id="business-address"
                        class="form-control"
                        rows="3"
                        placeholder="Enter your business or pickup address"></textarea>

                </div>

                <div class="form-group">

                    <label for="business-phone">

                        Business Phone Number

                    </label>

                    <input
                        id="business-phone"
                        class="form-control"
                        type="tel"
                        placeholder="07XXXXXXXX">

                </div>

                <div class="form-group">

                    <label for="store-logo">

                        Store Logo (Optional)

                    </label>

                    <input
                        id="store-logo"
                        class="form-control"
                        type="file"
                        accept="image/*">

                    <small>

                        Upload your store logo if you have one.

                    </small>

                </div>

                <section class="section">

                    <label class="checkbox">

                        <input
                            type="checkbox"
                            id="seller-agreement">

                        <span>

                            I confirm that the information provided is accurate and I agree to follow AdMarket's Seller Policy and Community Guidelines.

                        </span>

                    </label>

                </section>

                <div class="dashboard-actions">

                    <a
                        href="../buyer/dashboard.html"
                        class="btn btn-outline">

                        Cancel

                    </a>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Continue Verification

                    </button>

                </div>

            </form>

        </div>

    </main>

    <!-- Footer -->

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>

</body>

</html>
