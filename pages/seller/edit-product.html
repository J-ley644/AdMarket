<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Edit Product | AdMarket

    </title>

    <meta
        name="description"
        content="Update an existing product listing.">

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/app.css">

</head>

<body>

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <header class="dashboard-header">

        <div class="container">

            <a
                href="products.html"
                class="navbar-brand">

                <img
                    src="../../assets/images/logo.png"
                    alt="AdMarket Logo">

                <span>

                    AdMarket Seller

                </span>

            </a>

        </div>

    </header>

    <main class="dashboard">

        <div class="container">

            <section class="section-header">

                <h1>

                    Edit Product

                </h1>

                <p>

                    Update your product information below.

                </p>

            </section>

            <form id="edit-product-form">

                <!-- Basic Information -->

                <section class="section">

                    <div class="section-header">

                        <h2>

                            Basic Information

                        </h2>

                    </div>

                    <div class="form-group">

                        <label for="product-name">

                            Product Name

                        </label>

                        <input
                            id="product-name"
                            class="form-control"
                            type="text"
                            value="">

                    </div>

                    <div class="form-group">

                        <label for="product-category">

                            Category

                        </label>

                        <select
                            id="product-category"
                            class="form-control">

                            <option>Electronics</option>
                            <option>Fashion</option>
                            <option>Home & Living</option>
                            <option>Beauty</option>
                            <option>Sports</option>
                            <option>Books</option>
                            <option>Health</option>
                            <option>Automotive</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="product-description">

                            Description

                        </label>

                        <textarea
                            id="product-description"
                            class="form-control"
                            rows="6"></textarea>

                    </div>

                </section>

                <!-- Pricing -->

                <section class="section">

                    <div class="section-header">

                        <h2>

                            Pricing & Inventory

                        </h2>

                    </div>

                    <div class="form-group">

                        <label for="product-price">

                            Price (KES)

                        </label>

                        <input
                            id="product-price"
                            class="form-control"
                            type="number"
                            min="0">

                    </div>

                    <div class="form-group">

                        <label for="product-stock">

                            Stock Quantity

                        </label>

                        <input
                            id="product-stock"
                            class="form-control"
                            type="number"
                            min="0">

                    </div>

                </section>

                                <!-- Product Details -->

                <section class="section">

                    <div class="section-header">

                        <h2>

                            Product Details

                        </h2>

                    </div>

                    <div class="form-group">

                        <label for="product-brand">

                            Brand

                        </label>

                        <input
                            id="product-brand"
                            class="form-control"
                            type="text">

                    </div>

                    <div class="form-group">

                        <label for="product-condition">

                            Condition

                        </label>

                        <select
                            id="product-condition"
                            class="form-control">

                            <option>Brand New</option>
                            <option>Refurbished</option>
                            <option>Used - Like New</option>
                            <option>Used - Good</option>
                            <option>Used - Fair</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="product-sku">

                            SKU

                        </label>

                        <input
                            id="product-sku"
                            class="form-control"
                            type="text">

                    </div>

                </section>

                <!-- Product Images -->

                <section class="section">

                    <div class="section-header">

                        <h2>

                            Product Images

                        </h2>

                    </div>

                    <div class="image-placeholder">

                        Existing product images will appear here.

                    </div>

                    <div class="form-group">

                        <label for="new-product-images">

                            Upload New Images

                        </label>

                        <input
                            id="new-product-images"
                            class="form-control"
                            type="file"
                            accept="image/*"
                            multiple>

                    </div>

                </section>

                <!-- Shipping -->

                <section class="section">

                    <div class="section-header">

                        <h2>

                            Shipping Information

                        </h2>

                    </div>

                    <div class="form-group">

                        <label for="product-weight">

                            Weight (kg)

                        </label>

                        <input
                            id="product-weight"
                            class="form-control"
                            type="number"
                            step="0.01"
                            min="0">

                    </div>

                    <div class="form-group">

                        <label for="shipping-notes">

                            Shipping Notes

                        </label>

                        <textarea
                            id="shipping-notes"
                            class="form-control"
                            rows="4"></textarea>

                    </div>

                </section>

                <!-- Listing Status -->

                <section class="section">

                    <div class="section-header">

                        <h2>

                            Listing Status

                        </h2>

                    </div>

                    <div class="form-group">

                        <label for="listing-status">

                            Status

                        </label>

                        <select
                            id="listing-status"
                            class="form-control">

                            <option>Active</option>
                            <option>Draft</option>
                            <option>Out of Stock</option>
                            <option>Hidden</option>

                        </select>

                    </div>

                </section>

                <!-- Actions -->

                <section class="section">

                    <div class="dashboard-actions">

                        <a
                            href="products.html"
                            class="btn btn-outline">

                            Cancel

                        </a>

                        <button
                            type="button"
                            class="btn btn-outline">

                            Delete Product

                        </button>

                        <button
                            type="submit"
                            class="btn btn-primary">

                            Save Changes

                        </button>

                    </div>

                </section>

            </form>

        </div>

    </main>

    <!-- Footer -->

    <footer class="footer">

        <div class="container">

            <div class="footer-bottom">

                © 2026 AdMarket. All Rights Reserved.

            </div>

        </div>

    </footer>

    <script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/ui.js"></script>
<script src="../../assets/js/core/modal.js"></script>
<script src="../../assets/js/core/loader.js"></script>
<script src="../../assets/js/core/toast.js"></script>
<script src="../../assets/js/core/validator.js"></script>
<script src="../../assets/js/core/theme.js"></script>
<script src="../../assets/js/core/app.js"></script>
</body>

</html>
